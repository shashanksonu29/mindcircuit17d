name: Java CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: sonu171/shashankapp

    steps:

    #################################################
    # Checkout
    #################################################

    - name: Checkout Repository
      uses: actions/checkout@v4

    #################################################
    # Install Java
    #################################################

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: maven

    #################################################
    # Build & Unit Test
    #################################################

    - name: Build and Test
      run: mvn clean test

    #################################################
    # SonarQube Scan
    #################################################

    - name: SonarQube Scan
      env:
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn sonar:sonar \
        -Dsonar.host.url=$SONAR_HOST_URL \
        -Dsonar.token=$SONAR_TOKEN

    #################################################
    # Build Artifact
    #################################################

    - name: Build Package
      run: mvn clean package

    #################################################
    # Build Docker Image
    #################################################

    - name: Build Docker Image
      run: |
        docker build \
        -t $IMAGE_NAME:${{ github.run_number }} .

    #################################################
    # Install Trivy
    #################################################

    - name: Install Trivy
      run: |
        sudo apt-get update -y
    
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.71.2_Linux-64bit.deb
    
        sudo dpkg -i trivy_0.71.2_Linux-64bit.deb

    #################################################
    # Scan Docker Image
    #################################################

    - name: Scan Docker Image
      run: |
        trivy image \
        --severity CRITICAL \
        --exit-code 1 \
        $IMAGE_NAME:${{ github.run_number }}

    #################################################
    # Docker Login
    #################################################

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    #################################################
    # Push Docker Image
    #################################################

    - name: Push Docker Image
      run: |
        docker push $IMAGE_NAME:${{ github.run_number }}

    #################################################
    # Update GitOps Repo
    #################################################

    - name: Update Deployment Manifest
      run: |

        git config user.email "shashasonu29@gmail.com"
        git config user.name "shashanksonu29"

        sed -i "s/shashankapp:.*/shashankapp:${{ github.run_number }}/g" deploymentfiles/deploy.yaml

        git add .

        git commit -m "Updated image version ${{ github.run_number }}" || true

        git push https://${{ secrets.GITHUB_TOKEN_REPO }}@github.com/shashanksonu29/mindcircuit17d.git HEAD:main
